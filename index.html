<!DOCTYPE html>
<html>
    <head>
        <title>
            MeTube
        </title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="guide-panel" id="guide-panel">
            <button>Home</button>
            <button>shorts</button>
        </div>
        <div class="Upload-header" id="Upload-header">
            <div class="Upload" id="Upload-container">
                <div class="upload-screen-container" id="Upload-start">
                    <div class="upload-screen start">
                        <input id="file-picker" type="file" accept="video/mp4">
                    </div>
                </div>
                
                <div class="upload-screen-container" id="Upload-edit">
                    <div class="upload-screen edit">
                        <div class="upload-div-vertical up">
                            <div class="upload-div left">
                                <input type="text" class="Upload-input title" id="Upload-title">
                                <textarea class="Upload-input description" id="Upload-desc"></textarea>
                            </div>
                            <div class="upload-div rigth">
                                <video id="video-player-preview" controls>
                                    <source id="video-preview-source" src="">
                                </video>
                            </div>
                        </div>
                        <div class="upload-div-vertical down">
                            <div class="upload-div Publish">
                                <button id="Publish-button">Publish!</button>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        
        
        <div class="main">
            <div class="top-bar">
                <div class="guide-button" role="button" id="guide-button">
                    <p> = </p>
                </div>
                <div id="icon" class="icon" role="button">
                    <h1>MeTube</h1>
                </div>
                <div class="search-bar">
                    <input type="text">
                </div>
                <div class="buttons">
                    <div id="Upload-button" role="button">
                        <p>Upload</p>
                    </div>
                    <div id="mega-upload-btn" role="button">
                        <p>Upload big video</p>
                    </div>
                    <div id="mega-copy-btn" role="button">
                        <p>Copy MEGA link</p>
                    </div>
                </div>
            </div>
            <div class="screen active" id="home-page">
                <div id="video-grid-wrapper"></div>
            </div>
            <div class="screen" id="video-player">
                <div class="video-player video-display">
                    <video id="player" controls width="100%" poster="">
                        <source id="video-source" src="">
                    </video>
                </div>
                <div id="featured">
                    
                </div>
            </div>
            <div class="screen" id="shorts-viewer">
            </div>
        </div>
        
        
    </body>
    <script src="script.js" defer></script>
</html>
